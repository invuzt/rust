# File: .github/workflows/rust.yml
name: Rust CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  CARGO_TARGET_DIR: /dev/shm/cargo-target

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Rust Toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Run Tests
      run: cargo test --verbose
